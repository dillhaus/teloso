<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Azeret+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>window.WORKOUT_ROLE = 'overlay';</script>
<script src="store.js"></script>
<style>
  @keyframes wkoPulse { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes wkoBlink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.05)} }
</style>
</helmet>
<sc-if value="{{ ready }}" hint-placeholder-val="{{ true }}">
<div style="position:relative;width:1920px;height:1080px;font-family:'Archivo',system-ui,sans-serif;color:#fff;overflow:hidden;">

  <sc-if value="{{ modLabel }}" hint-placeholder-val="{{ true }}">
  <div style="position:absolute;top:56px;left:56px;display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(12,13,16,0.66);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.09);border-radius:14px;">
    <span style="width:9px;height:9px;border-radius:50%;background:#ff5c38;box-shadow:0 0 12px #ff5c38;animation:wkoPulse 1.6s ease-in-out infinite;"></span>
    <span style="font-family:'Azeret Mono',monospace;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;">{{ className }}</span>
  </div>
  </sc-if>

  <sc-if value="{{ showOverview }}" hint-placeholder-val="{{ true }}">
  <div style="position:absolute;top:56px;right:56px;width:340px;padding:20px 22px 14px;background:rgba(12,13,16,0.66);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.09);border-radius:16px;">
    <div style="font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px;">Session</div>
    <sc-for list="{{ overviewRows }}" as="row" hint-placeholder-count="4">
      <div style="{{ row.rowStyle }}">
        <span style="{{ row.barStyle }}"></span>
        <div style="display:flex;flex-direction:column;gap:2px;min-width:0;">
          <span style="{{ row.tagStyle }}">{{ row.phase }}</span>
          <span style="{{ row.labelStyle }}">{{ row.label }}</span>
        </div>
      </div>
    </sc-for>
  </div>
  </sc-if>

  <div style="position:absolute;bottom:56px;left:56px;max-width:820px;">
    <div style="display:flex;gap:10px;margin-bottom:20px;">
      <sc-if value="{{ modPhase }}" hint-placeholder-val="{{ true }}">
      <span style="display:inline-flex;align-items:center;padding:9px 16px;border-radius:10px;background:#ff5c38;color:#0b0c0e;font-family:'Azeret Mono',monospace;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;">{{ phase }}</span>
      </sc-if>
      <sc-if value="{{ modRound }}" hint-placeholder-val="{{ true }}">
      <span style="display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;background:rgba(12,13,16,0.66);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.09);font-family:'Azeret Mono',monospace;font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;">
        <span style="color:rgba(255,255,255,.5);">Round</span>
        <span>{{ roundCurrent }}</span><span style="color:rgba(255,255,255,.35);">/</span><span style="color:rgba(255,255,255,.6);">{{ roundTotal }}</span>
      </span>
      </sc-if>
    </div>
    <sc-if value="{{ modExercise }}" hint-placeholder-val="{{ true }}">
    <div style="font-size:84px;font-weight:800;line-height:0.95;letter-spacing:-2.5px;text-transform:uppercase;text-shadow:0 6px 30px rgba(0,0,0,.6);">{{ exercise }}</div>
    <div style="margin-top:18px;display:flex;align-items:center;gap:12px;">
      <span style="font-family:'Azeret Mono',monospace;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.45);">Next</span>
      <span style="width:22px;height:1px;background:rgba(255,255,255,.3);"></span>
      <span style="font-family:'Azeret Mono',monospace;font-size:15px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.85);text-shadow:0 2px 14px rgba(0,0,0,.6);">{{ nextUp }}</span>
    </div>
    </sc-if>
  </div>

  <sc-if value="{{ modTimer }}" hint-placeholder-val="{{ true }}">
  <div style="position:absolute;bottom:56px;right:56px;width:520px;padding:22px 28px 26px;background:rgba(12,13,16,0.66);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.09);border-radius:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">
      <span style="font-family:'Azeret Mono',monospace;font-size:15px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:{{ modeColor }};">{{ modeLabel }}</span>
      <span style="font-family:'Azeret Mono',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45);">{{ runLabel }}</span>
    </div>
    <div style="font-size:150px;font-weight:800;line-height:0.92;letter-spacing:-5px;font-variant-numeric:tabular-nums;text-align:right;color:{{ timeColor }};animation:{{ timeAnim }};">{{ timeDisplay }}</div>
    <div style="margin-top:14px;height:8px;border-radius:99px;background:rgba(255,255,255,.12);overflow:hidden;">
      <div style="height:100%;border-radius:99px;background:{{ modeColor }};width:{{ progressPct }};transition:width .25s linear;"></div>
    </div>
  </div>
  </sc-if>

</div>
</sc-if>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="22" fill="#0a0b0d"/>
  <circle cx="50" cy="55" r="19" fill="none" stroke="#ff5c38" stroke-width="5"/>
  <rect x="42" y="21" width="16" height="7" rx="3" fill="#ff5c38"/>
  <line x1="50" y1="55" x2="50" y2="42" stroke="#ff5c38" stroke-width="5" stroke-linecap="round"/>
</svg>
</template></x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { tick: 0 };

  componentDidMount() {
    const init = () => {
      if (!window.WorkoutStore) { this._wait = setTimeout(init, 20); return; }
      this.store = window.WorkoutStore;
      this.unsub = this.store.subscribe(() => this.forceUpdate());
      this.loop = setInterval(() => {
        this.store.tickAdvance();
        if (this.store.get().timer.running) this.forceUpdate();
      }, 250);
      this.forceUpdate();
    };
    init();
  }
  componentWillUnmount() {
    if (this.unsub) this.unsub();
    clearInterval(this.loop);
    clearTimeout(this._wait);
  }

  remainingSec() {
    const t = this.store.get().timer;
    return t.running ? Math.max(0, (t.endsAt - Date.now()) / 1000) : Math.max(0, t.remaining);
  }
  fmt(s) {
    s = Math.ceil(s);
    const m = Math.floor(s / 60);
    const ss = String(s % 60).padStart(2, '0');
    return m > 0 ? m + ':' + ss : '0:' + ss;
  }

  renderVals() {
    if (!this.store && window.WorkoutStore) this.store = window.WorkoutStore;
    if (!this.store) return { ready: false };
    const s = this.store.get();
    const t = s.timer;
    const rem = this.remainingSec();
    const frac = t.duration > 0 ? Math.max(0, Math.min(1, rem / t.duration)) : 0;
    const modeColor = t.mode === 'WORK' ? '#ff5c38' : '#3ddc97';
    const warn = t.running && rem <= 5.0001;
    const m = s.modules || {};
    const idx = s.stepIndex || 0;

    const overviewRows = (s.plan || []).map((it, i) => {
      const st = i < idx ? 'done' : (i === idx ? 'current' : 'upcoming');
      const bar = st === 'current' ? '#ff5c38' : (st === 'done' ? 'rgba(255,255,255,.28)' : 'rgba(255,255,255,.14)');
      const rowStyle = 'display:flex;gap:12px;align-items:stretch;padding:9px 11px;border-radius:10px;margin-bottom:5px;' + (st === 'current' ? 'background:rgba(255,92,56,0.13);' : '');
      const barStyle = 'width:3px;border-radius:2px;flex:none;background:' + bar + ';';
      const tagStyle = "font-family:'Azeret Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:" + (st === 'current' ? '#ff5c38' : 'rgba(255,255,255,.42)') + ';';
      const labelStyle = 'font-size:15px;font-weight:600;line-height:1.15;color:' + (st === 'current' ? '#fff' : (st === 'done' ? 'rgba(255,255,255,.4)' : 'rgba(255,255,255,.72)')) + ';' + (st === 'done' ? 'text-decoration:line-through;' : '');
      return { phase: it.phase, label: it.exercise, rowStyle, barStyle, tagStyle, labelStyle };
    });

    return {
      ready: true,
      className: s.className,
      phase: s.phase,
      roundCurrent: s.round.current,
      roundTotal: s.round.total,
      exercise: s.exercise,
      nextUp: s.nextUp,
      showOverview: !!s.showOverview && m.overview !== false,
      overviewRows,
      modLabel: m.label !== false,
      modPhase: m.phase !== false,
      modRound: m.round !== false,
      modExercise: m.exercise !== false,
      modTimer: m.timer !== false,
      modeColor,
      modeLabel: t.mode,
      timeDisplay: this.fmt(rem),
      timeColor: warn ? '#ff5c38' : '#fff',
      timeAnim: warn ? 'wkoBlink .9s ease-in-out infinite' : 'none',
      runLabel: t.running ? '' : 'Paused',
      progressPct: (frac * 100).toFixed(1) + '%',
    };
  }
}
</script>
</body>
</html>
